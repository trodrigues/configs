name: laterpay
root: ~/laterpay

windows:
  - webshell:
      layout: even-horizontal
      panes:
        - dockerfiles:
          - cd webshell/dockerfiles
          - docker-compose up -d cassandra redis postgres
          - sleep 20
          - docker-compose up -d
          - docker-compose logs --follow
        - connector:
          - cd connector
          - docker-compose up -d connector-standalone
          - docker-compose logs --follow
  - connectorui:
      layout: even-horizontal
      panes:
        - cuirun:
          - cd connector-ui
          - docker-compose up
        - cuigit:
          - cd connector-ui
  - assets:
      layout: even-horizontal
      panes:
        - assetswatch:
          - cd assets
        - assetstig:
          - cd assets
          - tig
  - lpdocs:
      layout: even-horizontal
      panes:
        - runlpdocs:
          - cd lpdocs
          - docker run --publish 8001:8000 --volume /Users/trodrigues/laterpay/lpdocs/lpdocs:/opt/laterpay/internaldocs/lpdocs -ti laterpay/lpdocs make preview
        - cdlpdocs:
          - cd lpdocs
  - lp:
    - ls
