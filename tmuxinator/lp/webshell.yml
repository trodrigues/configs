name: lp/mongoose
root: ~/laterpay

windows:
  - webshell:
      - cd webshell/dockerfiles
      - docker-compose up -d cassandra redis postgres
      - sleep 20
      - docker-compose up -d
      - docker-compose logs --follow
  - mongoose:
      layout: even-horizontal
      panes:
        - run:
          - cd mongoose
          - npm run watch
        - tests:
          - cd mongoose
          - npm run test
  - git:
      layout: even-horizontal
      panes:
        - gitsh:
          - cd mongoose
          - gitsh
        - cuigit:
          - cd mongoose
          - tig
  - assets:
      layout: even-horizontal
      panes:
        - assetswatch:
          - cd assets
        - assetstig:
          - cd assets
          - tig
  - lp:
    - ls
