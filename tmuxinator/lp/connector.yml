name: connector
root: ~/laterpay

windows:
  - connector:
      - cd connector
      - docker-compose up connector-standalone
  - connectorui:
      layout: even-horizontal
      panes:
        - run:
          - cd connector-ui
          - make start
        - tests:
          - cd connector-ui
          - npm run test:watch
  - git:
      layout: even-horizontal
      panes:
        - gitsh:
          - cd connector-ui
          - gitsh
        - cuigit:
          - cd connector-ui
          - tig
  - assets:
      layout: even-horizontal
      panes:
        - assetswatch:
          - cd assets
        - assetstig:
          - cd assets
          - tig
  - lp:
    - ls
